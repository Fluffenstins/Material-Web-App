<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inventory Item</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  padding: 12px;
  background: #ffffff;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.back-btn {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
}

/* Content */
.container {
  padding: 16px;
  flex: 1;
}

.card {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.field {
  margin-bottom: 12px;
}

.label {
  font-size: 14px;
  color: #666;
}

.value {
  font-size: 18px;
  font-weight: bold;
}

/* Input section */
.update-section {
  display: flex;
  gap: 8px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 16px;
}

.update-btn {
  background: #0078D4;
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 60px;
  background-color: #333;
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-around;
  z-index: 1000;
  background: #ffffff;
}

.action-btn {
  flex: 1;
  margin: 0 4px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  font-size: 12px;
  color: white;
  cursor: pointer;
}

.child-list {
list-style: none;
padding: 0;
}

.child-item {
display: flex;
justify-content: space-between;
align-items: center;
padding: 10px;
border-bottom: 1px solid #ddd;
}

.child-item:last-child {
border-bottom: none;
}

.receive { background: #28a745; }
.move { background: #dc3545; }
.stage { background: #ffc107; color: black; }
.qr { background: #17a2b8; }

@media (max-width: 480px) {
  .value {
    font-size: 16px;
  }
}
</style>
</head>

<body>
<div class="header">
  <button class="back-btn" onclick="history.back()">← Back</button>
</div>


</body>
</html>
