<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Filter List Example</title>
  <style>
    /* basic clean container styling */
    body { font-family: sans-serif; padding: 20px; }
    #myInput { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; }
    #myUL { list-style-type: none; padding: 0; margin: 0; }
    #myUL li a { border: 1px solid #ddd; margin-top: -1px; background-color: #f6f6f6; padding: 12px; text-decoration: none; font-size: 18px; color: black; display: block }
    #myUL li a:hover { background-color: #eee; }
  </style>
</head>
<body>

  <h2>My Contact List</h2>

  <!-- 1. The Filter Input Bar -->
  <input type="text" id="myInput" onkeyup="filterList()" placeholder="Search for names..">

  <!-- 2. The HTML List -->
  <ul id="myUL">
    <li><a href="#">Adele</a></li>
    <li><a href="#">Agnes</a></li>
    <li><a href="#">Billy</a></li>
    <li><a href="#">Bob</a></li>
    <li><a href="#">Calvin</a></li>
    <li><a href="#">Christina</a></li>
  </ul>

  <!-- 3. The Filtering Logic -->
  <script>
  function filterList() {
    // Declare variables
    var input, filter, ul, li, a, i, txtValue;
    input = document.getElementById('myInput');
    filter = input.value.toUpperCase(); // Case-insensitive matching
    ul = document.getElementById("myUL");
    li = ul.getElementsByTagName('li');

    // Loop through all list items, and hide those who don't match the search query
    for (i = 0; i < li.length; i++) {
      a = li[i].getElementsByTagName("a")[0];
      txtValue = a.textContent || a.innerText;
      
      if (txtValue.toUpperCase().indexOf(filter) > -1) {
        li[i].style.display = ""; // Shows item
      } else {
        li[i].style.display = "none"; // Hides item
      }
    }
  }
  </script>

</body>
</html>
