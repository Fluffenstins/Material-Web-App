<!DOCTYPE html>
<html lang="en">
<head>
<link rel="shortcut icon" type="image/x-icon" href="static/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .login-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 350px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 8px -10px 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
			
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #0078d7;
            border: none;
            color: white;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #005ea6;
        }

        .forgot {
            display: block;
            text-align: center;
            margin-top: 10px;
            text-decoration: none;
            color: #0078d7;
        }

        .forgot:hover {
            text-decoration: underline;
        }

        .register {
            display: block;
            text-align: center;
            margin-top: 10px;
            text-decoration: none;
            color: #0078d7;
        }

        .register:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Login</h2>
        <input type="text" name="email" id="email" placeholder="Email" required>
        <input type="password" name="password" id="password" placeholder="Password" required>
        <button type="submit" onclick="login();">Sign In</button>
    <a href="/updatePassword" class="forgot">Forgot Password?</a>
    <a href="/register" class="register">Register</a>
</div>

</body>

<script>
async function login() {
	const email_elem = document.getElementById("email");
	const password_elem = document.getElementById("password");
	
	const data = {
	"email": email_elem.value,
	"password": password_elem.value
	};
	let ret = await post_request('/api/login', data);
	let response_data = await ret.json();
	
	if (!ret.ok) {
		window.location.replace("/register");
	} else {
		let params = new URLSearchParams(document.location.search);
		let next_page = params.get("next"); // is the string "Jonathan"
		console.log(next_page);
		window.location.replace(document.referrer);
	}
	
	console.log(response_data);
}

async function post_request(url, data) {
	const ret = await fetch(url, {
  method: "POST",
  body: JSON.stringify(data),
  headers: {
    "Content-type": "application/json; charset=UTF-8"
  }
});
return ret;
}
</script>

</html>
