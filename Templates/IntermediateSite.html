<!DOCTYPE html>
<html lang="en">
<head>
<link rel="shortcut icon" type="image/x-icon" href="static/favicon.ico">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NuBuild Site</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  padding: 12px;
  background: #ffffff;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.back-btn {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
}

/* Content */
.container {
  padding: 16px;
  flex: 1;
  margin-bottom: 50px;
}

.card {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.field {
  margin-bottom: 12px;
}

.label {
  font-size: 14px;
  color: #666;
}

.value {
  font-size: 18px;
  font-weight: bold;
}

/* Input section */
.update-section {
  display: flex;
  gap: 8px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 16px;
}

.update-btn {
  background: #0078D4;
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 60px;
  background-color: #333;
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-around;
  z-index: 1000;
  background: #ffffff;
}

.action-btn {
  flex: 1;
  margin: 0 4px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  font-size: 12px;
  color: white;
  cursor: pointer;
}

.child-list {
list-style: none;
padding: 0;
}

.child-item {
display: flex;
justify-content: space-between;
align-items: center;
padding: 10px;
border-bottom: 1px solid #ddd;
}

.child-item:last-child {
border-bottom: none;
}

.receive { background: #28a745; color: black; }
.transfer { background: #D96125; }
.set_parent { background: #ffc107; color: black; }
.qr { background: #17a2b8; }
.in_transit { background: #C2A1F0; }
.complete_transfer { background: #51F59F; }

@media (max-width: 480px) {
  .value {
    font-size: 16px;
  }
}
</style>
</head>

<body>
{% include "Header.html" %}

<div class="container">
  <div class="card">
    <div class="field">
      <div class="label">Site ID</div>
        <div class="update-btn" id="site_id" onclick="window.location.assign('/site?site_id={{site_obj.id}}')">{{site_obj.display_name}}</div>
	  </div
	</div>
    <div class="field">
      <div class="label">Status</div>
      <div class="value" id="description">{{site_obj.status}}</div>
    </div>
  </div>
  <div class="card">
    <div class="field">
      <div class="label">Pick Up Material</div>
        <div class="update-btn in_transit" id="site_id" onclick="handleTransitButton();">In Transit</div>
	  </div
	</div>
  </div>
  <div class="card">
    <div class="field">
      <div class="label">Complete Transfer</div>
        <div class="update-btn complete_transfer" id="site_id" onclick="handleCompleteButton();">Arrived at Site</div>
	  </div
	</div>
  </div>
</div>

<div class="bottom-bar">
  <button class="action-btn qr"  onclick="handleButtonUrl('{{qr_code_url}}', true)">Get QR Code</button>
</div>

<script>
function handleButtonUrl(action, open_new_window) {
			if (open_new_window) {
				window.open(action, '_blank');
			} else {
				window.location.href = action
			}
        }
		
async function handleTransitButton() {
	const data = {
	"site_id": "{{site_obj.id}}"
	};
	let ret = await post_request('/api/pickUpMaterial', data);
	let response_data = await ret.json();
	
	if (!ret.ok) {
		console.log("Displaying error " + response_data['error']);
		display_generic_error(response_data['error']);
	} else {
		window.location.reload();
	}
}
		
async function handleCompleteButton() {
	const data = {
	"source_id": "{{site_obj.id}}"
	};
	let ret = await post_request('/api/completeIntermediateTransfer', data);
	let response_data = await ret.json();
	
	if (!ret.ok) {
		console.log("Displaying error " + response_data['error']);
		display_generic_error(response_data['error']);
	} else {
		window.location.reload();
	}
}
		
async function submitReceive() {
	const source_elem = document.getElementById("source_input");
	const target_elem = document.getElementById("target_input");
	const item_elem = document.getElementById("catalogue_item_input");
	const qty_elem = document.getElementById("qty_input");
	
	const data = {
	"source": source_elem.value,
	"target": target_elem.value,
	"item": item_elem.value,
	"qty": qty_elem.value
	};
	let ret = await post_request(data);
	let response_data = await ret.json();
	
	if (!ret.ok) {
		console.log("Displaying error " + response_data['error']);
		display_generic_error(response_data['error']);
	} else {
		display_generic_success("Receive successful!");
		//history.back();
		window.location.replace(document.referrer);
	}
	
	console.log(response_data);
}

async function post_request(url, data) {
	const ret = await fetch(url, {
  method: "POST",
  body: JSON.stringify(data),
  headers: {
    "Content-type": "application/json; charset=UTF-8"
  }
});
return ret;
}
	
</script>

</body>
</html>
