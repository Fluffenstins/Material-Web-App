<!DOCTYPE html>
<html lang="en">
<head>
<link rel="shortcut icon" type="image/x-icon" href="static/favicon.ico">
<meta charset="UTF-8">
<title>Top Bar</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* Top Bar */
.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background-color: #1f2937;
    color: white;
    padding: 10px 20px;
}

/* Left section */
.topbar-left {
    display: flex;
    align-items: center;
}

/* Back Button */
.back-btn {
    background: none;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    margin-right: 15px;
}

.back-btn:hover {
    opacity: 0.7;
}

/* Tabs */
.tabs {
    display: flex;
    gap: 20px;
}

.tab {
    cursor: pointer;
    padding-bottom: 4px;
}

.tab.active {
    border-bottom: 2px solid #3b82f6;
}

/* Right section */
.topbar-right {
    display: flex;
    align-items: center;
    gap: 15px;
}

/* User section */
.user {
    display: flex;
    align-items: center;
    gap: 8px;
}

.user-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background-color: #4b5563;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Logout button */
.logout-btn {
    background-color: #ef4444;
    border: none;
    padding: 6px 10px;
    color: white;
    cursor: pointer;
    border-radius: 4px;
}

.logout-btn:hover {
    background-color: #dc2626;
}
</style>

</head>

<body>

<div class="topbar">

    <!-- Left -->
    <div class="topbar-left">
        <button class="back-btn" onclick="history.back()">←</button>

        <div class="tabs">
			{% if current_tab == "Sites" %}
				<div class="tab active">Sites</div>
			{% else %}
				<div class="tab" onclick="window.location.href='/sites'">Sites</div>
				<div class="tab active">{{current_tab}}</div>
			{% endif %}
        </div>
    </div>

    <!-- Right -->
    <div class="topbar-right">
        <div class="user">
            <div class="user-icon"  onclick="handleButtonUrl('/?obj_id={{user_obj.id}}')">{{user_obj.first_name[0].upper()}}</div>
            <span>{{user_obj.first_name}}</span>
        </div>
        <button class="logout-btn" onclick="window.location.href='/logout'">Logout</button>
    </div>

</div>

</body>
</html>
